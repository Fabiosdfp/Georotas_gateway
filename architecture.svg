<svg width="680" viewBox="0 0 680 640" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Arquitetura MVP — App de Geração de Rotas (v2)</title>
  <desc>Diagrama corrigido: roxo = nossos serviços, azul = APIs públicas, âmbar = geocoding público, cinza = infraestrutura.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- fundo -->
  <rect width="680" height="640" fill="#111111"/>

  <!-- CLIENT -->
  <rect x="255" y="20" width="170" height="52" rx="8" fill="#2C2C2A" stroke="#888780" stroke-width="0.5"/>
  <text font-family="Arial" font-size="14" font-weight="500" fill="#D3D1C7" x="340" y="43" text-anchor="middle">Cliente</text>
  <text font-family="Arial" font-size="12" fill="#888780" x="340" y="61" text-anchor="middle">Web / Mobile</text>

  <!-- Arrow cliente -> gateway -->
  <line x1="340" y1="72" x2="340" y2="116" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text font-family="Arial" font-size="11" fill="#888780" x="348" y="98">JWT no header</text>

  <!-- GATEWAY (nosso serviço — roxo) -->
  <rect x="170" y="118" width="340" height="80" rx="8" fill="#26215C" stroke="#534AB7" stroke-width="0.5"/>
  <text font-family="Arial" font-size="14" font-weight="500" fill="#CECBF6" x="340" y="145" text-anchor="middle">API Gateway</text>
  <text font-family="Arial" font-size="12" fill="#AFA9EC" x="340" y="163" text-anchor="middle">Python 3.12 · FastAPI · porta 8000</text>
  <text font-family="Arial" font-size="12" fill="#AFA9EC" x="340" y="181" text-anchor="middle">Valida JWT · injeta X-User-Id · /token</text>

  <!-- Arrow gateway -> clerk (dashed) -->
  <path d="M510 158 L578 158 L578 278 L572 278" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
  <text font-family="Arial" font-size="11" fill="#888780" x="516" y="150">JWKS</text>

  <!-- CLERK (API pública — azul) -->
  <rect x="572" y="254" width="88" height="52" rx="8" fill="#042C53" stroke="#185FA5" stroke-width="0.5"/>
  <text font-family="Arial" font-size="14" font-weight="500" fill="#B5D4F4" x="616" y="276" text-anchor="middle">Clerk</text>
  <text font-family="Arial" font-size="12" fill="#378ADD" x="616" y="294" text-anchor="middle">Auth público</text>

  <!-- Arrow gateway -> customers api -->
  <line x1="340" y1="198" x2="340" y2="270" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text font-family="Arial" font-size="11" fill="#888780" x="348" y="236">X-User-Id</text>

  <!-- CUSTOMERS API (nosso serviço — roxo, mesma família do gateway) -->
  <rect x="170" y="272" width="340" height="80" rx="8" fill="#26215C" stroke="#534AB7" stroke-width="0.5"/>
  <text font-family="Arial" font-size="14" font-weight="500" fill="#CECBF6" x="340" y="299" text-anchor="middle">Customers API</text>
  <text font-family="Arial" font-size="12" fill="#AFA9EC" x="340" y="317" text-anchor="middle">Java 21 · Spring Boot 3 · porta 8080</text>
  <text font-family="Arial" font-size="12" fill="#AFA9EC" x="340" y="335" text-anchor="middle">CRUD · geocoding · isolamento por user</text>

  <!-- Arrow customers -> postgres -->
  <line x1="270" y1="352" x2="196" y2="430" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- POSTGRES (infraestrutura — cinza) -->
  <rect x="96" y="430" width="204" height="70" rx="8" fill="#2C2C2A" stroke="#888780" stroke-width="0.5"/>
  <text font-family="Arial" font-size="14" font-weight="500" fill="#D3D1C7" x="198" y="456" text-anchor="middle">PostgreSQL 16</text>
  <text font-family="Arial" font-size="12" fill="#888780" x="198" y="474" text-anchor="middle">tabela: customers</text>
  <text font-family="Arial" font-size="12" fill="#888780" x="198" y="490" text-anchor="middle">id · user_id · lat · lng</text>

  <!-- Arrow customers -> nominatim (dashed) -->
  <line x1="410" y1="352" x2="472" y2="430" stroke="#888780" stroke-width="1" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
  <text font-family="Arial" font-size="11" fill="#888780" x="448" y="396">POST / PUT</text>

  <!-- NOMINATIM (API pública — âmbar) -->
  <rect x="388" y="430" width="212" height="70" rx="8" fill="#412402" stroke="#BA7517" stroke-width="0.5"/>
  <text font-family="Arial" font-size="14" font-weight="500" fill="#FAC775" x="494" y="456" text-anchor="middle">Nominatim (OSM)</text>
  <text font-family="Arial" font-size="12" fill="#EF9F27" x="494" y="474" text-anchor="middle">Geocoding gratuito</text>
  <text font-family="Arial" font-size="12" fill="#EF9F27" x="494" y="490" text-anchor="middle">endereço → lat / lng</text>

  <!-- LEGEND BOX -->
  <rect x="40" y="524" width="600" height="96" rx="8" fill="#1a1a1a" stroke="#444441" stroke-width="0.5"/>

  <!-- linha 1: setas -->
  <line x1="60" y1="544" x2="94" y2="544" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text font-family="Arial" font-size="11" fill="#888780" x="100" y="548">Fluxo principal</text>

  <line x1="240" y1="544" x2="274" y2="544" stroke="#888780" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
  <text font-family="Arial" font-size="11" fill="#888780" x="280" y="548">Chamada a API externa</text>

  <!-- linha 2: nossos serviços -->
  <rect x="60" y="562" width="12" height="10" rx="2" fill="#534AB7"/>
  <text font-family="Arial" font-size="11" fill="#888780" x="78" y="571">Nossos serviços — Gateway e Customers API</text>

  <!-- linha 3: APIs públicas -->
  <rect x="60" y="582" width="12" height="10" rx="2" fill="#185FA5"/>
  <text font-family="Arial" font-size="11" fill="#888780" x="78" y="591">API pública de auth — Clerk</text>

  <rect x="300" y="582" width="12" height="10" rx="2" fill="#BA7517"/>
  <text font-family="Arial" font-size="11" fill="#888780" x="318" y="591">API pública de geocoding — Nominatim</text>

  <!-- linha 4: infraestrutura -->
  <rect x="60" y="602" width="12" height="10" rx="2" fill="#5F5E5A"/>
  <text font-family="Arial" font-size="11" fill="#888780" x="78" y="611">Infraestrutura — Cliente e PostgreSQL</text>
</svg>
